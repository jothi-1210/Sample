<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Jothi Static Website</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            text-align: center;
            background-color: #f4f7f6;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { color: #0078d4; } /* Azure Blue */
        .status-badge {
            background-color: #d1e7dd;
            color: #0f5132;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Cloud Deployment Successful!</h1>
        <p class="status-badge">Status: Live on Microsoft Azure</p>
        
        <p>This is a <strong>Static Web Page</strong> created for my student project.</p>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        
        <h3>Why Azure?</h3>
        <ul style="text-align: left; display: inline-block;">
            <li>Scalable infrastructure</li>
            <li>Integrated GitHub Actions (CI/CD)</li>
            <li>Free hosting for students</li>
        </ul>
    </div>

    <footer>
        <p>Built with &hearts; by a Student Developer | 2026</p>
    </footer>

</body>
</html>
